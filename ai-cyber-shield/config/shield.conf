# Balu Cyber Shield safe defaults.

SCAN_INTERVAL_SECONDS=15
MAX_CPU_PERCENT=80
MAX_MEMORY_PERCENT=70
MAX_CONNECTIONS_PER_PROCESS=30

# Space-separated port list. These are common backdoor, shell, IRC bot, and test ports.
SUSPICIOUS_REMOTE_PORTS="23 2323 4444 5555 6667 1337 31337"

# Space-separated process basename fragments that should be treated as suspicious.
SUSPICIOUS_PROCESS_PATTERNS="xmrig minerd ncat netcat nc.openbsd meterpreter cryptominer reverse_shell"

# Local process names that should never be killed by the contain command.
PROTECTED_PROCESS_NAMES="launchd kernel_task WindowServer loginwindow securityd configd notifyd syslogd mds mds_stores airportd opendirectoryd sshd"

# Force kill remains disabled unless you explicitly turn it on.
ALLOW_FORCE_KILL=false

