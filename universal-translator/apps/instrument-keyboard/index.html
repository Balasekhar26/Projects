<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#111827" />
    <title>OneSetup Instrument Keyboard</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="stage" aria-labelledby="app-title">
        <div class="brand-row">
          <div class="mark" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div>
            <p class="eyebrow">Offline Cross-Platform Music App</p>
            <h1 id="app-title">OneSetup Instrument Keyboard</h1>
          </div>
        </div>

        <div class="controls" aria-label="Instrument and octave controls">
          <label class="control">
            <span>Instrument</span>
            <select id="instrument-select"></select>
          </label>

          <label class="control">
            <span>Octave</span>
            <select id="octave-select">
              <option value="2">2</option>
              <option value="3" selected>3</option>
              <option value="4">4</option>
              <option value="5">5</option>
            </select>
          </label>

          <label class="toggle">
            <input id="sustain-toggle" type="checkbox" />
            <span>Sustain</span>
          </label>

          <button id="panic-button" class="icon-button" type="button" title="Stop all notes" aria-label="Stop all notes">
            ■
          </button>
        </div>

        <div class="readout" aria-live="polite">
          <div>
            <span class="readout-label">Last key</span>
            <strong id="last-key">Press any key</strong>
          </div>
          <div>
            <span class="readout-label">Note</span>
            <strong id="last-note">Ready</strong>
          </div>
          <div>
            <span class="readout-label">Status</span>
            <strong id="offline-status">Offline ready</strong>
          </div>
        </div>

        <canvas id="scope" class="scope" width="1200" height="180" aria-label="Audio visualizer"></canvas>
      </section>

      <section class="keyboard-panel" aria-label="Playable keyboard">
        <div id="keyboard-grid" class="keyboard-grid"></div>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
