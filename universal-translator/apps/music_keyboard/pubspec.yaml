name: music_keyboard
description: Cross-platform musical keyboard app
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  audioplayers: ^5.2.1
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/piano/
    - assets/sounds/guitar/
    - assets/sounds/violin/
    - assets/sounds/flute/
    - assets/sounds/synth/

flutter:
  plugin:
    platforms:
      web:
        pluginClass: WebPlugin
        fileName: music_keyboard_web.dart
